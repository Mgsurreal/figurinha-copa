<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figurinhas Personalizadas</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0d3b1f;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    color:#ffd700;
}

.box{
    background:#124d28;
    padding:20px;
    border-radius:15px;
}

input,select{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    background:#ffd700;
    color:black;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.whatsapp{
    margin-top:20px;
    font-size:24px;
    color:#25D366;
}
</style>

</head>

<body>

<div class="container">

<h1>⚽ FIGURINHAS PERSONALIZADAS</h1>

<div class="box">

<h2>Crie sua figurinha estilo Copa do Mundo</h2>

<input type="text" placeholder="Seu nome">

<select>
<option>Brasil</option>
<option>Argentina</option>
<option>França</option>
</select>

<input type="number" placeholder="Número da camisa">

<button>GERAR PRÉVIA</button>

</div>

<div class="whatsapp">
📱 WhatsApp: 11 98862-3592
</div>

</div>

</body>
</html>
