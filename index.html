<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surreal Studio Design</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0d3b1f;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
}

h1{
    color:#ffd700;
}

.box{
    background:#124d28;
    padding:20px;
    border-radius:15px;
}

input,select{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button{
    background:#ffd700;
    color:black;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.whatsapp{
    margin-top:20px;
    font-size:24px;
    color:#25D366;
}
</style>

</head>

<body>

<div class="container">

<h1>⚽ FIGURINHAS PERSONALIZADAS</h1>

<div class="box">

<h2>Crie sua figurinha estilo Copa do Mundo</h2>

<input type="text" id="nome" placeholder="Seu nome">

<select id="selecao">
<option>Brasil</option>
<option>Argentina</option>
<option>França</option>
</select>

<input type="number" id="numero" placeholder="Número da camisa">

<input type="file" id="foto">

<img id="preview"
     width="250"
     style="display:none; margin-top:20px; border-radius:15px;">

<br><br>

<button onclick="gerarPrevia()">
GERAR PRÉVIA
</button>

<br><br>

<canvas id="figurinha"
        width="350"
        height="500"
        style="
        background:white;
        border:3px solid gold;
        border-radius:15px;">
</canvas>

</div>

<div class="whatsapp">
📱 WhatsApp: 11 98862-3592
</div>

</div>

   <script>

const foto = document.getElementById("foto");
const preview = document.getElementById("preview");

foto.addEventListener("change", function(){

    const arquivo = this.files[0];

    if(arquivo){
        preview.src = URL.createObjectURL(arquivo);
        preview.style.display = "block";
    }

});

function gerarPrevia(){

    const nome = document.getElementById("nome").value;
    const numero = document.getElementById("numero").value;
    const selecao = document.getElementById("selecao").value;

    const canvas = document.getElementById("figurinha");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,350,500);

    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0,0,350,500);

    ctx.fillStyle = "#FFD700";
    ctx.fillRect(0,0,350,60);

    ctx.fillStyle = "#000";
    ctx.font = "bold 24px Arial";
    ctx.fillText(selecao,20,40);

    const img = new Image();

    img.onload = function(){

        ctx.drawImage(img,25,80,300,250);

        ctx.fillStyle = "#000";

        ctx.font = "bold 28px Arial";
        ctx.fillText(nome,20,390);

        ctx.font = "bold 40px Arial";
        ctx.fillText("#"+numero,20,450);

    };

    img.src = preview.src;

}

</script></body>
</html>
